name: imageviewer
description: "Image viewer with gallery, swipe, zoom, NovelAI metadata, and developer logs"
publish_to: 'none'
version: 2.0.11+11

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  photo_manager: ^3.9.0
  flutter_svg: ^2.3.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  path: ^1.9.1
  exif: ^3.3.0
  image: ^4.8.0
  crop_your_image: ^2.0.0
  app_links: ^7.0.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

# path_provider_android 2.3.x switched to a JNI-based implementation that
# bundles libdartjni.so. On Android 16 (Galaxy S25+) the kernel uses 16KB
# memory pages; libdartjni.so in jni 1.0.0 is only 4KB-aligned and the
# dynamic linker refuses to load it, crashing the process before any Java
# code runs. Force the pre-JNI 2.2.x series until the jni package ships
# 16KB-aligned .so files.
dependency_overrides:
  path_provider_android: '>=2.2.5 <2.3.0'
